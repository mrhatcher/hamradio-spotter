auto_launch_jtdx = yes
jtdx_slice_a = C:\Users\micha\AppData\Local\JTDX - Slice-A\jtdx.exe
# jtdx_slice_b = C:\Users\micha\AppData\Local\JTDX - Slice-B\jtdx.exe

[slices]
# Each slice is a separate JTDX instance on a separate UDP port.
# Format: slice_<name> = <port>
# Omit slice_b to run single-slice mode (backward compatible).
slice_a = 2338
